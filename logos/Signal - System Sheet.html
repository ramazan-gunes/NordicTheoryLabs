<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper:      #F1EEE6;
    --paper-soft: #E9E5DA;
    --ink:        #0E1620;
    --ink-soft:   #2A323E;
    --ink-mute:   #6B7280;
    --line:       rgba(14, 22, 32, 0.12);
    --line-soft:  rgba(14, 22, 32, 0.06);
    --accent:     oklch(0.55 0.13 220);

    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans:  "Manrope", "Helvetica Neue", system-ui, sans-serif;
    --mono:  "JetBrains Mono", ui-monospace, monospace;
  }

  html, body { background: var(--paper-soft); margin: 0; font-family: var(--sans); color: var(--ink); }

  /* plate chrome (shared with v2) */
  .plate {
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: var(--paper);
    color: var(--ink);
  }
  .plate.dark { background: var(--ink); color: var(--paper); }
  .head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 22px 0;
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-mute);
  }
  .head .num { font-variant-numeric: tabular-nums; }
  .foot {
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 18px;
    padding: 14px 22px 18px;
    border-top: 1px solid var(--line-soft);
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.04em;
    color: var(--ink-mute);
  }
  .foot .name {
    font-family: var(--serif); font-style: italic;
    font-size: 18px; letter-spacing: -0.01em;
    color: var(--ink); text-transform: none;
  }
  .plate.dark .foot .name { color: var(--paper); }
  .foot .tag { text-transform: uppercase; }

  /* brief / cover */
  .cover {
    width: 100%; height: 100%;
    padding: 56px 60px; box-sizing: border-box;
    display: flex; flex-direction: column; gap: 26px;
    background: var(--paper);
  }
  .cover .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-mute);
    display: flex; align-items: center; gap: 14px;
  }
  .cover .eyebrow::before { content: ""; width: 28px; height: 1px; background: var(--ink-mute); }
  .cover h1 {
    margin: 0; font-size: 64px; font-weight: 500;
    letter-spacing: -0.025em; line-height: 1.02; max-width: 18ch;
  }
  .cover h1 em { font-family: var(--serif); font-style: italic; font-weight: 400; }
  .cover h1 .deg { font-family: var(--serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .cover p {
    font-size: 17px; color: var(--ink-soft); line-height: 1.55;
    max-width: 56ch; margin: 0;
  }
  .cover .grid {
    margin-top: auto;
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0; border-top: 1px solid var(--line);
  }
  .cover .grid > div { padding: 18px 22px 4px; border-right: 1px solid var(--line-soft); }
  .cover .grid > div:last-child { border-right: 0; }
  .cover .grid .k {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em;
    color: var(--ink-mute); text-transform: uppercase; margin-bottom: 8px;
  }
  .cover .grid .v { font-size: 16px; color: var(--ink); line-height: 1.35; }
  .cover .grid .v em { font-family: var(--serif); font-style: italic; }
</style>
</head>
<body>
